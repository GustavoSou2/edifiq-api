spring:
  main:
    web-application-type: none

  datasource:
    url: jdbc:h2:mem:edifiq_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  rabbitmq:
    listener:
      simple:
        auto-startup: false

edifiq:
  messaging:
    order-distribution-exchange: order.distribution.exchange.test
    order-distribution-routing-key: order.distribution.requested.test
    order-distribution-queue: order.distribution.queue.test
    order-distribution-dlx: order.distribution.dlx.test
    order-distribution-dlq: order.distribution.dlq.test
    order-distribution-dlq-routing-key: order.distribution.failed.test
