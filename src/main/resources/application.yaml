spring:
  application:
    name: edifiq-api

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/edifiq?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway cuida das migrations — JPA só valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true # Project Loom — virtual threads

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.leilao: INFO
    org.springframework.security: WARN

edifiq:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    access-token-ttl: PT24H
